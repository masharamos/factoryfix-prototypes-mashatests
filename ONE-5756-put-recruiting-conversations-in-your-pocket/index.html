<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Companion — FactoryFix Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://use.typekit.net/gkr8rvz.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --ff-green: #53D58B;
      --ff-purple: #6C40E5;
      --ff-black: #0F172A;
      --ff-washed-green: #F1FCF5;
      --ff-washed-purple: #F4F4FE;
      --ff-gray-bg: #F1F5F9;
      --ff-border: #CBD5E1;
      --ff-text-muted: #64748B;
      --ff-text-secondary: #475569;
      --ff-success: #159B54;
      --ff-caution: #C7A432;
      --ff-critical: #CF3E3E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #E2E8F0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Desktop: side-by-side phone frames */
    .desktop-layout {
      display: flex;
      gap: 48px;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 24px;
      min-height: 100vh;
    }

    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 36px;
      border: 8px solid #1E293B;
      background: #fff;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 25px 60px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.05);
    }

    .phone-frame-label {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--ff-text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .phone-inner {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .phone-inner::-webkit-scrollbar { display: none; }
    .phone-inner { -ms-overflow-style: none; scrollbar-width: none; }

    /* Mobile: full bleed */
    @media (max-width: 639px) {
      body { background: #fff; }
      .desktop-layout {
        flex-direction: column;
        padding: 0;
        gap: 0;
      }
      .phone-frame {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        border-radius: 0;
        border: none;
        box-shadow: none;
      }
      .phone-frame-label { display: none; }
      .phone-frame.hidden-mobile { display: none; }
    }

    /* Status bar */
    .status-bar {
      background: var(--ff-black);
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 4px;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .status-bar-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }

    /* Navbar */
    .navbar {
      background: var(--ff-black);
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
      gap: 12px;
      position: relative;
    }

    .navbar-logo {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .navbar-back-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
      white-space: nowrap;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .navbar-back-btn:active { opacity: 0.6; }

    .navbar-hamburger {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .navbar-hamburger:active { opacity: 0.6; }

    /* Shared header */
    .header-dark {
      background: #1E293B; /* shade-860 */
      padding: 12px 16px;
      flex-shrink: 0;
    }

    /* Inbox header */
    .inbox-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0 12px;
    }

    .inbox-title {
      font-size: 17px;
      font-weight: 900;
      color: #fff;
      font-family: 'museo-sans', 'Inter', sans-serif;
    }

    .unread-badge {
      background: var(--ff-purple);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .search-bar {
      background: #334155; /* shade-840 */
      border: 1px solid #475569; /* shade-820 */
      border-radius: 6px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94A3B8; /* base-400 */
      font-size: 13px;
    }

    .search-bar svg { flex-shrink: 0; }

    /* List area */
    .list-area {
      background: var(--ff-gray-bg);
      flex: 1;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ff-text-muted);
      padding: 16px 16px 8px;
    }

    /* Candidate row */
    .candidate-row {
      background: #fff;
      padding: 20px 16px 20px 28px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      border-bottom: 1px solid #E2E8F0;
      cursor: pointer;
      min-height: 44px;
      transition: background 0.1s;
      position: relative;
    }

    .candidate-row:active { background: var(--ff-gray-bg); }

    .unread-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ff-purple);
      position: absolute;
      left: 10px;
      top: 28px;
    }

    /* Avatar */
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--ff-text-secondary);
      background: #E2E8F0;
      flex-shrink: 0;
    }

    /* Row content */
    .row-content { flex: 1; min-width: 0; }

    .row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .row-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--ff-black);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-name-suffix {
      font-weight: 400;
      color: var(--ff-text-secondary);
    }

    .row-time {
      font-size: 12px;
      color: var(--ff-text-muted);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .row-applied {
      font-size: 12px;
      color: var(--ff-text-muted);
      margin-top: 2px;
    }

    .row-preview {
      font-size: 14px;
      line-height: 1.45;
      color: var(--ff-text-secondary);
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }


    /* ── Candidate Detail ── */

    .detail-header {
      background: #1E293B; /* shade-860, same as inbox header */
      padding: 12px 16px 0;
      flex-shrink: 0;
    }

    .detail-top-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
    }

    .back-btn {
      color: var(--ff-green);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      padding: 4px 0;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .back-btn:active { opacity: 0.7; }

    /* TODO: replace Inter 700 with Museo when font is available */
    .detail-name {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stage-dropdown-btn {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--ff-black);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    .stage-dropdown-btn:active { opacity: 0.7; }

    .stage-chevron {
      color: var(--ff-text-muted);
    }

    .detail-download-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      display: flex;
      align-items: center;
    }

    .detail-download-btn:active { opacity: 0.6; }

    .detail-actions-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .detail-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
    }

    .detail-job {
      font-size: 11px;
      color: #94A3B8;
    }

    .score-badge {
      background: #BEF4D5; /* primary-100 */
      color: var(--ff-black);
      font-size: 13px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #E2E8F0;
    }

    .score-badge-star {
      color: #184F32; /* primary-800 */
      display: flex;
    }

    .score-badge-num {
      text-decoration: underline;
      text-decoration-color: #3B82F6;
      text-underline-offset: 3px;
      text-decoration-thickness: 2px;
    }

    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 0 16px 12px;
      background: #1E293B; /* shade-860 */
    }

    .tab-btn {
      font-size: 11px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .tab-btn.active {
      background: #fff;
      color: var(--ff-black);
    }

    .tab-btn:not(.active) {
      background: transparent;
      color: #94A3B8;
    }

    .tab-btn:not(.active):active { color: #fff; }

    /* Conversation */
    .conversation-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-card {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-card.ai {
      background: rgba(174, 53, 247, 0.05);
      border: 1px solid rgba(179, 54, 255, 0.1);
      border-radius: 12px 12px 4px 12px;
    }

    .msg-card.candidate {
      background: #F1F5F9;
      border: 1px solid #EBF0F5;
      border-radius: 4px 8px 8px 8px;
      padding: 8px;
      gap: 4px;
    }

    .msg-card-header {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 16px;
    }

    .msg-sender {
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      line-height: 18px;
    }

    .ai-badge {
      font-size: 12px;
      font-weight: 700;
      background: rgba(179, 54, 255, 0.1);
      color: #5F30D1;
      padding: 0 4px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .msg-time {
      font-size: 12px;
      color: var(--ff-text-secondary);
      margin-left: auto;
    }

    .msg-body {
      font-size: 14px;
      line-height: 21px;
      color: #0F172A;
    }

    /* Reply bar */
    .reply-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #fff;
      border-top: 0.5px solid var(--ff-border);
      flex-shrink: 0;
    }

    .reply-input {
      flex: 1;
      background: var(--ff-gray-bg);
      border: none;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 13px;
      font-family: inherit;
      color: var(--ff-black);
      outline: none;
    }

    .reply-input::placeholder { color: var(--ff-text-muted); }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--ff-black);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn:active { opacity: 0.7; }

    /* Action sheet */
    .action-sheet {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #fff;
      border-top: 0.5px solid var(--ff-border);
      overflow-x: auto;
      flex-shrink: 0;
    }

    .action-sheet::-webkit-scrollbar { display: none; }

    .action-chip {
      font-size: 12px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }

    .action-chip.primary {
      background: var(--ff-black);
      color: #fff;
    }

    .action-chip.secondary {
      background: var(--ff-washed-purple);
      color: var(--ff-purple);
    }

    .action-chip.outline {
      background: #fff;
      color: var(--ff-text-secondary);
      border: 1px solid var(--ff-border);
    }

    .action-chip:active { opacity: 0.7; }

    /* Stage dropdown */
    .stage-dropdown-wrapper {
      position: relative;
    }

    .stage-dropdown-list {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      overflow: hidden;
      z-index: 10;
      min-width: 140px;
    }

    .stage-option {
      padding: 10px 16px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      color: var(--ff-black);
    }

    .stage-option:active,
    .stage-option:hover { background: var(--ff-washed-green); }

    .stage-option.active {
      color: var(--ff-purple);
      font-weight: 600;
    }

    /* Resume tab */
    .resume-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #fff;
    }

    .resume-section {
      margin-bottom: 24px;
    }

    .resume-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ff-text-muted);
      margin-bottom: 12px;
    }

    .exp-item {
      margin-bottom: 12px;
    }

    .exp-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ff-black);
    }

    .exp-company {
      font-size: 12px;
      color: var(--ff-text-secondary);
    }

    .exp-dates {
      font-size: 11px;
      color: var(--ff-text-muted);
      margin-top: 2px;
    }

    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .skill-pill {
      background: var(--ff-gray-bg);
      color: var(--ff-text-secondary);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
    }

    .edu-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ff-black);
    }

    .edu-school {
      font-size: 12px;
      color: var(--ff-text-secondary);
    }

    .edu-year {
      font-size: 11px;
      color: var(--ff-text-muted);
      margin-top: 2px;
    }

    /* Contact tab */
    .contact-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #fff;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 0.5px solid var(--ff-border);
    }

    .contact-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--ff-gray-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-label {
      font-size: 11px;
      color: var(--ff-text-muted);
    }

    .contact-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--ff-black);
    }

    .contact-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .contact-action-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      min-height: 44px;
    }

    .contact-action-btn.call {
      background: var(--ff-green);
      color: var(--ff-black);
    }

    .contact-action-btn.text {
      background: var(--ff-black);
      color: #fff;
    }

    .contact-action-btn:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    const AVATAR_COLORS = {

    const CONVERSATIONS = {
      1: [
        { id: 1, content: "Hi Marcus! I'm reaching out about the CNC Machine Operator role at Precision Manufacturing. Do you have experience with CNC mills and lathes?", timestamp: 'Yesterday 4:12 PM', isBotMessage: true },

      3: [
        { id: 1, content: "Hi Miguel! We have a Welding Technician opening at Summit Metal Works. Do you have TIG welding experience?", timestamp: 'Monday 9:00 AM', isBotMessage: true },
        { id: 2, content: "Yes I have 6 years TIG experience, plus MIG and stick. I can do stainless and aluminum too.", timestamp: 'Monday 12:20 PM', isProMessage: true },
        { id: 3, content: "Excellent qualifications! The role pays $30–35/hr depending on experience. Can we schedule you for a weld test?", timestamp: 'Monday 12:25 PM', isBotMessage: true },
        { id: 4, content: "Yes I have 6 years TIG experience", timestamp: '1h ago', isProMessage: true },
      ],
    };

    const RESUME_DATA = {
      1: {
        experience: [
          { title: 'CNC Machinist III', company: 'Great Lakes Stamping', dates: '2019 – Present', years: '5 yrs' },
          { title: 'CNC Operator', company: 'Heartland Industrial', dates: '2016 – 2019', years: '3 yrs' },
        ],
        skills: ['Haas Mills', 'Mazak Lathes', 'GD&T', 'Mastercam', 'Blueprint Reading', 'Inspection'],
        education: { degree: 'AAS Machining Technology', school: 'Kalamazoo Valley Community College', year: '2015' },
      },
    };

    const CONTACT_DATA = {
      1: { phone: '(616) 555-0182', email: 'm.johnson@email.com', location: 'Grand Rapids, MI' },
      2: { phone: '(312) 555-0247', email: 's.chen@email.com', location: 'Chicago, IL' },
      3: { phone: '(419) 555-0391', email: 'm.rodriguez@email.com', location: 'Toledo, OH' },
    };

    const STAGES = ['Screening', 'Interview', 'Offer', 'Hired', 'Rejected'];

    /* ── Components ── */

    function StatusBar() {
      return (
        <div className="status-bar">
          <span>9:41</span>
          <div className="status-bar-icons">
            <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><rect x="0" y="6" width="2.5" height="4" rx="0.5" fill="#fff"/><rect x="3.5" y="4" width="2.5" height="6" rx="0.5" fill="#fff"/><rect x="7" y="2" width="2.5" height="8" rx="0.5" fill="#fff"/><rect x="10.5" y="0" width="2.5" height="10" rx="0.5" fill="#fff"/></svg>
            <svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M7 2.5C8.8 2.5 10.4 3.2 11.5 4.3L12.6 3.2C11.2 1.8 9.2 1 7 1S2.8 1.8 1.4 3.2L2.5 4.3C3.6 3.2 5.2 2.5 7 2.5Z" fill="#fff"/><path d="M7 5.5C8 5.5 9 5.9 9.7 6.6L10.8 5.5C9.8 4.5 8.4 4 7 4S4.2 4.5 3.2 5.5L4.3 6.6C5 5.9 6 5.5 7 5.5Z" fill="#fff"/><circle cx="7" cy="8.5" r="1.2" fill="#fff"/></svg>
            <svg width="22" height="10" viewBox="0 0 22 10" fill="none"><rect x="0" y="1" width="18" height="8" rx="2" stroke="#fff" strokeWidth="1"/><rect x="1.5" y="2.5" width="13" height="5" rx="1" fill="#fff"/><rect x="19" y="3" width="2" height="4" rx="0.5" fill="#fff"/></svg>
          </div>
        </div>
      );
    }

    function Avatar({ initials }) {
      return (
        <div className="avatar">
          {initials}
        </div>
      );
    }

    /* ── Inbox Screen ── */

    function InboxScreen({ onSelectCandidate }) {
      return (
        <div className="phone-inner">
          <StatusBar />
          <div className="navbar">
            <div className="navbar-logo">
              {/* FactoryFix hex logo */}
              <img src="/assets/ff-logo-hex.svg" alt="FactoryFix" width="28" height="24" />
            </div>
            <button className="navbar-back-btn">
              Show full version
            </button>
            <button className="navbar-hamburger">
              <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
                <line x1="0" y1="1" x2="20" y2="1" stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
                <line x1="0" y1="7" x2="20" y2="7" stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
                <line x1="0" y1="13" x2="20" y2="13" stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
              </svg>
            </button>
          </div>
          <div className="header-dark">
            <div className="inbox-title-row">
              <span className="inbox-title">Mobile Inbox</span>
              <span className="unread-badge">{ALL_UNREAD.length} unread</span>
            </div>
            <div className="search-bar">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="5" stroke="#64748B" strokeWidth="1.5"/><line x1="10" y1="10" x2="13" y2="13" stroke="#64748B" strokeWidth="1.5" strokeLinecap="round"/></svg>
              <span>Search candidates...</span>
            </div>
          </div>
          <div className="list-area">
            {ALL_UNREAD.map(c => (
              <div key={c.id} className="candidate-row" onClick={() => onSelectCandidate(c)}>
                <div className="unread-dot" />
                <Avatar initials={c.initials} />
                <div className="row-content">
                  <div className="row-top">
                    <span className="row-name">{c.name} <span className="row-name-suffix">messaged you</span></span>
                    <span className="row-time">{c.time}</span>
                  </div>
                  <div className="row-applied">Applied to {c.appliedTo}</div>
                  <div className="row-preview">{c.preview}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── Candidate Detail Screen ── */

    function CandidateDetail({ candidate, onBack }) {
      const [activeTab, setActiveTab] = useState('conversation');
      const [stageOpen, setStageOpen] = useState(false);
      const [currentStage, setCurrentStage] = useState(candidate.status);

      const messages = CONVERSATIONS[candidate.id] || CONVERSATIONS[1];
      const resume = RESUME_DATA[candidate.id] || RESUME_DATA[1];
      const contact = CONTACT_DATA[candidate.id] || CONTACT_DATA[1];

      const firstName = candidate.name.split(' ')[0];

      return (
        <div className="phone-inner">
          <StatusBar />
          <div className="navbar">
            <div className="navbar-logo">
              <img src="/assets/ff-logo-hex.svg" alt="FactoryFix" width="28" height="24" />
            </div>
            <button className="navbar-back-btn" onClick={onBack}>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M7.5 2.5L4 6l3.5 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Back
            </button>
            <button className="navbar-hamburger">
              <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
                <line x1="0" y1="1" x2="20" y2="1" stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
                <line x1="0" y1="7" x2="20" y2="7" stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
                <line x1="0" y1="13" x2="20" y2="13" stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
              </svg>
            </button>
          </div>
          <div className="detail-header">
            <div className="detail-top-row">
              <span className="detail-name" style={{ flex: 1 }}>{candidate.name}</span>
              <div className="detail-actions-right">
                <div className="stage-dropdown-wrapper">
                  <button className="stage-dropdown-btn" onClick={() => setStageOpen(!stageOpen)}>
                    {currentStage}
                    <svg className="stage-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="#64748B" strokeWidth="1.5" strokeLinejoin="round"/></svg>
                  </button>
                  {stageOpen && (
                    <div className="stage-dropdown-list">
                      {STAGES.map(s => (
                        <button
                          key={s}
                          className={`stage-option ${s === currentStage ? 'active' : ''}`}
                          onClick={() => { setCurrentStage(s); setStageOpen(false); }}
                        >
                          {s}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
                <button className="detail-download-btn">
                  <img src="/assets/icon-download.svg" alt="Download" width="22" height="22" />
                </button>
              </div>
            </div>
            <div className="detail-meta-row">
              <span className="detail-job">{candidate.job} · {candidate.company}</span>
              <span className="score-badge">
                <span className="score-badge-star">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1l1.76 3.57 3.94.57-2.85 2.78.67 3.93L7 10.07l-3.52 1.78.67-3.93L1.3 5.14l3.94-.57L7 1z" fill="#184F32"/></svg>
                </span>
                <span className="score-badge-num">{candidate.score ? (candidate.score / 20).toFixed(1) : '4.5'}</span>
              </span>
            </div>
          </div>

          <div className="tab-bar">
            {['conversation', 'resume', 'contact'].map(tab => (
              <button
                key={tab}
                className={`tab-btn ${activeTab === tab ? 'active' : ''}`}
                onClick={() => setActiveTab(tab)}
              >
                {tab.charAt(0).toUpperCase() + tab.slice(1)}
              </button>
            ))}
          </div>

          {/* Tab content */}
          {activeTab === 'conversation' && (
            <div className="conversation-area">
              {messages.map(msg => (
                <div key={msg.id} className={`msg-card ${msg.isBotMessage ? 'ai' : 'candidate'}`}>
                  <div className="msg-card-header">
                    {msg.isBotMessage ? (
                      <span className="ai-badge">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                          <path d="M9.8 12.8L10.7 13.2L9.8 13.6L9.4 14.5L9 13.6L8.1 13.2L9 12.8L9.4 11.5L9.8 12.8ZM8.2 6.5C8.27 6.49 8.34 6.5 8.4 6.54C8.46 6.57 8.51 6.62 8.54 6.69C8.56 6.75 8.57 6.82 8.55 6.88L7.4 10.1H9.5C9.56 10.1 9.61 10.12 9.66 10.15C9.71 10.18 9.74 10.22 9.77 10.27C9.79 10.32 9.8 10.38 9.79 10.43C9.78 10.49 9.76 10.54 9.72 10.58L4.8 15.3C4.75 15.35 4.69 15.38 4.62 15.39C4.55 15.4 4.48 15.39 4.42 15.36C4.36 15.33 4.31 15.28 4.29 15.22C4.26 15.16 4.26 15.09 4.28 15.03L5.43 11.8H3.3C3.24 11.8 3.19 11.78 3.14 11.75C3.09 11.72 3.05 11.68 3.02 11.63C3 11.58 2.99 11.52 3 11.47C3.01 11.41 3.04 11.36 3.08 11.32L7.99 6.54C8.04 6.49 8.11 6.47 8.18 6.5H8.2ZM5.4 7.1L6.6 7.5L5.4 7.9L5 9L4.6 7.9L3.4 7.5L4.6 7.1L5 6L5.4 7.1Z" fill="url(#copilotGrad)"/>
                          <defs><radialGradient id="copilotGrad" cx="0" cy="0" r="1" gradientTransform="translate(6.5 10) scale(8)"><stop stopColor="#B336FF"/><stop offset="1" stopColor="#6C40E5"/></radialGradient></defs>
                        </svg>
                        Copilot
                      </span>
                    ) : (
                      <span className="msg-sender">{candidate.name}</span>
                    )}
                    <span className="msg-time">{msg.timestamp}</span>
                  </div>
                  <div className="msg-body">{msg.content}</div>
                </div>
              ))}
            </div>
          )}

          {activeTab === 'resume' && (
            <div className="resume-area">
              <div className="resume-section">
                <div className="resume-section-title">Experience</div>
                {resume.experience.map((exp, i) => (
                  <div key={i} className="exp-item">
                    <div className="exp-title">{exp.title}</div>
                    <div className="exp-company">{exp.company}</div>
                    <div className="exp-dates">{exp.dates} · {exp.years}</div>
                  </div>
                ))}
              </div>
              <div className="resume-section">
                <div className="resume-section-title">Skills</div>
                <div className="skills-grid">
                  {resume.skills.map((s, i) => (
                    <span key={i} className="skill-pill">{s}</span>
                  ))}
                </div>
              </div>
              <div className="resume-section">
                <div className="resume-section-title">Education</div>
                <div className="edu-title">{resume.education.degree}</div>
                <div className="edu-school">{resume.education.school}</div>
                <div className="edu-year">{resume.education.year}</div>
              </div>
            </div>
          )}

          {activeTab === 'contact' && (
            <div className="contact-area">
              <div className="contact-item">
                <div className="contact-icon">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14.5 11.3v1.9a1.3 1.3 0 01-1.4 1.3 12.7 12.7 0 01-5.5-2 12.5 12.5 0 01-3.8-3.8A12.7 12.7 0 011.8 3.1 1.3 1.3 0 013 1.8h1.9a1.3 1.3 0 011.3 1.1c.1.7.3 1.4.5 2a1.3 1.3 0 01-.3 1.3l-.8.8a10.1 10.1 0 003.8 3.8l.8-.8a1.3 1.3 0 011.3-.3c.7.2 1.3.4 2 .5a1.3 1.3 0 011 1.1z" stroke="#64748B" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <div>
                  <div className="contact-label">Phone</div>
                  <div className="contact-value">{contact.phone}</div>
                </div>
              </div>
              <div className="contact-item">
                <div className="contact-icon">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="10" rx="1.5" stroke="#64748B" strokeWidth="1.3"/><path d="M1.5 4.5L8 9l6.5-4.5" stroke="#64748B" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <div>
                  <div className="contact-label">Email</div>
                  <div className="contact-value">{contact.email}</div>
                </div>
              </div>
              <div className="contact-item">
                <div className="contact-icon">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13 6.7C13 10.5 8 14.5 8 14.5S3 10.5 3 6.7a5 5 0 1110 0z" stroke="#64748B" strokeWidth="1.3"/><circle cx="8" cy="6.7" r="1.5" stroke="#64748B" strokeWidth="1.3"/></svg>
                </div>
                <div>
                  <div className="contact-label">Location</div>
                  <div className="contact-value">{contact.location}</div>
                </div>
              </div>
              <div className="contact-actions">
                <button className="contact-action-btn call">Call</button>
                <button className="contact-action-btn text">Text</button>
              </div>
            </div>
          )}

          {/* Reply bar — only on Conversation tab */}
          {activeTab === 'conversation' && (
            <div className="reply-bar">
              <input className="reply-input" placeholder={`Reply to ${firstName}...`} />
              <button className="send-btn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
            </div>
          )}

          {/* Action sheet — all tabs */}
          <div className="action-sheet">
            <button className="action-chip primary">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="1.5" width="10" height="9" rx="1" stroke="#fff" strokeWidth="1.2"/><path d="M3.5 1.5V0M8.5 1.5V0M1 4h10" stroke="#fff" strokeWidth="1.2" strokeLinecap="round"/></svg>
              Schedule interview
            </button>
            <button
              className="action-chip secondary"
              onClick={() => setStageOpen(!stageOpen)}
            >
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="#6C40E5" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Move stage
            </button>
            <button className="action-chip outline">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 7l5 5 5-5" stroke="#475569" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              {activeTab === 'resume' ? 'Download' : 'Resume'}
            </button>
          </div>
        </div>
      );
    }

    /* ── App (Desktop: side-by-side, Mobile: single screen) ── */

    function App() {
      const [selectedCandidate, setSelectedCandidate] = useState(null);
      const [demoCandidate] = useState(UNREAD_MESSAGES[0]);
      const isMobile = window.innerWidth < 640;

      if (isMobile) {
        return (
          <div className="desktop-layout">
            <div className="phone-frame">
              {selectedCandidate ? (
                <CandidateDetail
                  candidate={selectedCandidate}
                  onBack={() => setSelectedCandidate(null)}
                />
              ) : (
                <InboxScreen onSelectCandidate={setSelectedCandidate} />
              )}
            </div>
          </div>
        );
      }

      return (
        <div className="desktop-layout">
          <div>
            <div className="phone-frame-label">Mobile Inbox</div>
            <div className="phone-frame">
              <InboxScreen onSelectCandidate={setSelectedCandidate} />
            </div>
          </div>
          <div>
            <div className="phone-frame-label">Candidate Detail — {selectedCandidate ? selectedCandidate.name : demoCandidate.name}</div>
            <div className="phone-frame">
              <CandidateDetail
                candidate={selectedCandidate || demoCandidate}
                onBack={() => setSelectedCandidate(null)}
              />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
