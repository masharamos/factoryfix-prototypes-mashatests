<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Companion — FactoryFix Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://use.typekit.net/gkr8rvz.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --ff-green: #53D58B;
      --ff-purple: #6C40E5;
      --ff-black: #0F172A;
      --ff-washed-green: #F1FCF5;
      --ff-washed-purple: #F4F4FE;
      --ff-gray-bg: #F1F5F9;
      --ff-border: #CBD5E1;
      --ff-text-muted: #64748B;
      --ff-text-secondary: #475569;
      --ff-success: #159B54;
      --ff-caution: #C7A432;
      --ff-critical: #CF3E3E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #E2E8F0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Desktop: side-by-side phone frames */
    .desktop-layout {
      display: flex;
      gap: 48px;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 24px;
      min-height: 100vh;
    }

    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 36px;
      border: 8px solid #1E293B;
      background: #fff;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 25px 60px rgba(0,0,0,0.2), 0 0 0 1px rgba(0,0,0,0.05);
    }

    .phone-frame-label {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--ff-text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .phone-inner {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .phone-inner::-webkit-scrollbar { display: none; }
    .phone-inner { -ms-overflow-style: none; scrollbar-width: none; }

    /* Mobile: full bleed */
    @media (max-width: 639px) {
      body { background: #fff; }
      .desktop-layout {
        flex-direction: column;
        padding: 0;
        gap: 0;
      }
      .phone-frame {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        border-radius: 0;
        border: none;
        box-shadow: none;
      }
      .phone-frame-label { display: none; }
      .phone-frame.hidden-mobile { display: none; }
    }

    /* Status bar */
    .status-bar {
      background: var(--ff-black);
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 4px;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .status-bar-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }

    /* Navbar */
    .navbar {
      background: var(--ff-black);
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
      gap: 12px;
      position: relative;
    }

    .navbar-logo {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .navbar-back-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
      white-space: nowrap;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .navbar-back-btn:active { opacity: 0.6; }

    .navbar-hamburger {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .navbar-hamburger:active { opacity: 0.6; }

    /* Shared header */
    .header-dark {
      background: #1E293B; /* shade-860 */
      padding: 12px 16px 16px;
      flex-shrink: 0;
    }

    /* Inbox header */
    .inbox-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0 16px;
    }

    .inbox-title {
      font-size: 17px;
      font-weight: 900;
      color: #fff;
      font-family: 'museo-sans', 'Inter', sans-serif;
    }

    .unread-badge {
      background: var(--ff-purple);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .search-bar {
      background: #334155; /* shade-840 */
      border: 1px solid #475569; /* shade-820 */
      border-radius: 6px;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94A3B8; /* base-400 */
      font-size: 13px;
    }

    .search-bar svg { flex-shrink: 0; }

    /* List area */
    .list-area {
      background: var(--ff-gray-bg);
      flex: 1;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ff-text-muted);
      padding: 16px 16px 8px;
    }

    /* Candidate row */
    .candidate-row {
      background: #fff;
      padding: 20px 16px 20px 28px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      border-bottom: 1px solid #E2E8F0;
      cursor: pointer;
      min-height: 44px;
      transition: background 0.1s;
      position: relative;
    }

    .candidate-row:active { background: var(--ff-gray-bg); }

    .unread-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ff-purple);
      position: absolute;
      left: 10px;
      top: 28px;
    }

    /* Avatar */
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--ff-text-secondary);
      background: #E2E8F0;
      flex-shrink: 0;
    }

    /* Row content */
    .row-content { flex: 1; min-width: 0; }

    .row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .row-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--ff-black);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-name-suffix {
      font-weight: 400;
      color: var(--ff-text-secondary);
    }

    .row-time {
      font-size: 12px;
      color: var(--ff-text-muted);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .row-applied {
      font-size: 12px;
      color: var(--ff-text-muted);
      margin-top: 2px;
    }

    .row-preview {
      font-size: 14px;
      line-height: 1.45;
      color: var(--ff-text-secondary);
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }


    /* ── Candidate Detail ── */

    .detail-header {
      background: #1E293B; /* shade-860, same as inbox header */
      padding: 12px 16px 8px;
      flex-shrink: 0;
    }

    .detail-top-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
    }

    .back-btn {
      color: var(--ff-green);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      padding: 4px 0;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .back-btn:active { opacity: 0.7; }

    .detail-back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #fff;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: -4px;
    }

    .detail-back-btn:active { opacity: 0.6; }

    .detail-name-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    /* TODO: replace Inter 700 with Museo when font is available */
    .detail-name {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stage-dropdown-btn {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 6px;
      padding: 4px 12px 4px 8px;
      font-size: 12px;
      font-weight: 400;
      line-height: 24px;
      color: #000;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      min-height: 36px;
    }

    .stage-dropdown-btn:active { opacity: 0.7; }

    .stage-dropdown-label {
      font-family: inherit;
      font-size: 12px;
      line-height: 24px;
    }

    .detail-download-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      display: flex;
      align-items: center;
    }

    .detail-download-btn:active { opacity: 0.6; }

    .detail-actions-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .detail-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .detail-job {
      font-size: 11px;
      color: #94A3B8;
    }

    .score-badge {
      background: #53D58B; /* primary-300 */
      color: #0F172A; /* shade-880 */
      font-size: 12px;
      font-weight: 600;
      line-height: 1.5;
      padding: 2px 4px 2px 2px;
      border-radius: 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 2px;
      border: none;
    }

    .score-badge-star {
      color: #184F32; /* primary-800 */
      display: flex;
    }

    .score-badge-num {
      text-decoration: none;
    }

    /* Tabs */
    .tab-bar-wrap {
      background: transparent;
      padding: 8px 0 0;
      flex-shrink: 0;
    }

    .tab-bar {
      display: flex;
      align-items: center;
      background: #334155;
      border-radius: 6px;
      padding: 2px;
      gap: 0;
    }

    .tab-btn {
      flex: 1;
      min-width: 0;
      font-family: inherit;
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
      color: #fff;
      text-align: center;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .tab-btn.active {
      background: #fff;
      color: #000;
      font-weight: 500;
    }

    .tab-btn:not(.active):active { opacity: 0.7; }

    /* Conversation */
    .conversation-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-card {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-card.ai {
      background: rgba(174, 53, 247, 0.05);
      border: 1px solid rgba(179, 54, 255, 0.1);
      border-radius: 12px 12px 4px 12px;
    }

    .msg-card.candidate {
      background: #F1F5F9;
      border: 1px solid #EBF0F5;
      border-radius: 4px 8px 8px 8px;
      padding: 8px;
      gap: 4px;
    }

    .msg-card-header {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 16px;
    }

    .msg-sender {
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      line-height: 18px;
    }

    .ai-badge {
      font-size: 12px;
      line-height: 16px;
      font-weight: 700;
      background: rgba(179, 54, 255, 0.1);
      color: #5F30D1;
      padding: 0 4px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .ai-badge img {
      width: 16px;
      height: 20px;
      display: block;
      flex-shrink: 0;
    }

    .msg-time {
      font-size: 12px;
      color: var(--ff-text-secondary);
      margin-left: auto;
    }

    .msg-body {
      font-size: 14px;
      line-height: 21px;
      color: #0F172A;
    }

    /* Reply bar */
    .reply-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      background: #fff;
      border-top: 0.5px solid var(--ff-border);
      flex-shrink: 0;
    }

    .reply-plus-btn {
      width: 20px;
      height: 20px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #000;
    }

    .reply-input-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      background: #fff;
      border: 1px solid #CBD5E1;
      border-radius: 6px;
      height: 36px;
      padding: 0 8px;
      gap: 8px;
    }

    .reply-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      padding: 4px 8px;
      font-size: 12px;
      line-height: 16px;
      font-family: inherit;
      color: var(--ff-black);
      outline: none;
    }

    .reply-input::placeholder { color: #8191AA; }

    .send-btn {
      width: 20px;
      height: 20px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #94A3B8;
      padding: 0;
    }

    .send-btn:active { opacity: 0.7; }

    /* Action sheet */
    .action-sheet {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #fff;
      border-top: 0.5px solid var(--ff-border);
      flex-shrink: 0;
    }

    .action-sheet > .action-chip,
    .action-sheet > .stage-dropdown-wrapper {
      flex: 1 1 0;
      min-width: 0;
    }

    .action-sheet .stage-dropdown-btn {
      width: 100%;
      justify-content: space-between;
    }

    .action-sheet > .action-chip.primary {
      justify-content: center;
    }

    .action-sheet::-webkit-scrollbar { display: none; }

    .action-chip {
      font-size: 12px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }

    .action-chip.primary {
      background: #000;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      line-height: 18px;
      letter-spacing: 0.02em;
      padding: 8px 12px;
      border-radius: 6px;
      gap: 6px;
      min-height: 36px;
    }

    .action-chip.secondary {
      background: var(--ff-washed-purple);
      color: var(--ff-purple);
    }

    .action-chip.outline {
      background: #fff;
      color: var(--ff-text-secondary);
      border: 1px solid var(--ff-border);
    }

    .action-chip:active { opacity: 0.7; }

    /* Stage dropdown */
    .stage-dropdown-wrapper {
      position: relative;
    }

    .stage-dropdown-list {
      position: absolute;
      bottom: 100%;
      left: 0;
      margin-bottom: 4px;
      background: #fff;
      border-radius: 6px;
      box-shadow:
        0 16px 64px -24px rgba(0,0,0,0.2),
        0 8px 40px -16px rgba(0,0,0,0.1),
        0 1px 2px -1px rgba(0,0,0,0.2);
      overflow: hidden;
      z-index: 100;
      min-width: 180px;
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stage-option {
      padding: 4px 12px;
      height: 32px;
      font-size: 12px;
      line-height: 18px;
      cursor: pointer;
      border: none;
      background: #fff;
      width: 100%;
      text-align: left;
      font-family: inherit;
      color: #000;
      font-weight: 400;
      display: flex;
      align-items: center;
    }

    .stage-option:active,
    .stage-option:hover { background: #F4F4FE; }

    .stage-option.active {
      background: #ECEAFD;
      color: #000;
      font-weight: 700;
    }

    /* Resume tab */
    .resume-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: #F1F5F9;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Copilot Output block */
    .copilot-output {
      background: #F1FCF5;
      border: 1px solid #DEFAEA;
      border-radius: 12px 12px 4px 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .copilot-output-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .copilot-output-left {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .rating-chip {
      background: #53D58B;
      border-radius: 4px;
      padding: 2px 4px 2px 2px;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 24px;
      font-size: 12px;
      color: #000;
    }

    .rating-chip-score {
      background: #fff;
      border-radius: 2px;
      padding: 0 4px 0 2px;
      height: 20px;
      display: flex;
      align-items: center;
      gap: 2px;
      font-weight: 800;
      color: #0F172A;
      font-size: 14px;
    }

    .rating-chip-for {
      font-weight: 400;
    }

    .rating-chip-job {
      font-weight: 700;
    }

    .copilot-output-visibility {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-style: italic;
      color: #64748B;
      line-height: 18px;
      white-space: nowrap;
    }

    .copilot-output-bullets {
      margin: 0;
      padding-left: 20px;
      color: #0F172A;
      font-size: 14px;
      line-height: 21px;
    }

    .copilot-output-bullets li {
      margin-bottom: 0;
    }

    .copilot-output-bottom {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .output-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .output-chip {
      background: #BEF4D5;
      color: #1B7A45;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 8px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      line-height: 1;
    }

    .output-feedback {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .output-feedback-label {
      font-size: 10px;
      font-style: italic;
      color: #64748B;
    }

    .output-feedback-btn {
      background: none;
      border: none;
      padding: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .output-feedback-btn:active { opacity: 0.5; }

    .resume-doc {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #E2E8F0;
      padding: 20px 18px;
    }

    .resume-download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0F172A;
      color: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px 6px 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.25), 0 2px 4px rgba(15, 23, 42, 0.15);
    }

    .resume-download-btn:active { opacity: 0.85; }

    .resume-head {
      padding-bottom: 14px;
      border-bottom: 1px solid #E2E8F0;
      margin-bottom: 16px;
    }

    .resume-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .resume-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--ff-black);
      line-height: 1.2;
    }

    .resume-headline {
      font-size: 13px;
      color: #475569;
      font-weight: 600;
      margin-top: 2px;
    }

    .resume-contact-line {
      font-size: 11px;
      color: var(--ff-text-secondary);
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      line-height: 1.4;
    }

    .resume-dot {
      color: var(--ff-text-muted);
    }

                <div className="resume-section">
                  <div className="resume-section-title">Experience</div>
                  {resume.experience.map((exp, i) => (
                    <div key={i} className="exp-item">
                      <div className="exp-top">
                        <div className="exp-title">{exp.title}</div>
                        <div className="exp-dates">{exp.dates}</div>
                      </div>
                      <div className="exp-company">{exp.company} · {exp.location}</div>
                      <ul className="exp-bullets">
                        {exp.bullets.map((b, j) => (
                          <li key={j}>{b}</li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>

                <div className="resume-section">
                  <div className="resume-section-title">Skills</div>
                  <div className="skills-grid">
                    {resume.skills.map((s, i) => (
                      <span key={i} className="skill-pill">{s}</span>
                    ))}
                  </div>
                </div>

                {resume.certifications && (
                  <div className="resume-section">
                    <div className="resume-section-title">Certifications</div>
                    {resume.certifications.map((c, i) => (
                      <div key={i} className="cert-item">
                        <span className="cert-name">{c.name}</span>
                        <span className="cert-year">{c.year}</span>
                      </div>
                    ))}
                  </div>
                )}

                <div className="resume-section">
                  <div className="resume-section-title">Education</div>
                  <div className="edu-title">{resume.education.degree}</div>
                  <div className="edu-school">{resume.education.school}</div>
                  <div className="edu-year">{resume.education.year}</div>
                </div>
              </div>
            </div>
          )}

          {activeTab === 'contact' && (
            <div className="contact-area">
              <div className="contact-item">
                <div className="contact-icon">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14.5 11.3v1.9a1.3 1.3 0 01-1.4 1.3 12.7 12.7 0 01-5.5-2 12.5 12.5 0 01-3.8-3.8A12.7 12.7 0 011.8 3.1 1.3 1.3 0 013 1.8h1.9a1.3 1.3 0 011.3 1.1c.1.7.3 1.4.5 2a1.3 1.3 0 01-.3 1.3l-.8.8a10.1 10.1 0 003.8 3.8l.8-.8a1.3 1.3 0 011.3-.3c.7.2 1.3.4 2 .5a1.3 1.3 0 011 1.1z" stroke="#64748B" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <div>
                  <div className="contact-label">Phone</div>
                  <div className="contact-value">{contact.phone}</div>
                </div>
              </div>
              <div className="contact-item">
                <div className="contact-icon">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="10" rx="1.5" stroke="#64748B" strokeWidth="1.3"/><path d="M1.5 4.5L8 9l6.5-4.5" stroke="#64748B" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <div>
                  <div className="contact-label">Email</div>
                  <div className="contact-value">{contact.email}</div>
                </div>
              </div>
              <div className="contact-item">
                <div className="contact-icon">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13 6.7C13 10.5 8 14.5 8 14.5S3 10.5 3 6.7a5 5 0 1110 0z" stroke="#64748B" strokeWidth="1.3"/><circle cx="8" cy="6.7" r="1.5" stroke="#64748B" strokeWidth="1.3"/></svg>
                </div>
                <div>
                  <div className="contact-label">Location</div>
                  <div className="contact-value">{contact.location}</div>
                </div>
              </div>
            </div>
          )}

          {/* Reply bar — only on Conversation tab */}
          {activeTab === 'conversation' && (
            <div className="reply-bar">
              <button className="reply-plus-btn" aria-label="Add attachment">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <circle cx="10" cy="10" r="8.33" stroke="currentColor" strokeWidth="1.67"/>
                  <path d="M10 6.67v6.67M6.67 10h6.67" stroke="currentColor" strokeWidth="1.67" strokeLinecap="round"/>
                </svg>
              </button>
              <div className="reply-input-wrap">
                <input className="reply-input" placeholder={`Message ${firstName}`} />
                <button className="send-btn" aria-label="Send">
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M17.5 2.5L9.17 10.83M17.5 2.5l-5.83 15-3.34-7.5-7.5-3.33L17.5 2.5z" stroke="currentColor" strokeWidth="1.67" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>
          )}

          {/* Action sheet — all tabs */}
          <div className="action-sheet">
            <button className="action-chip primary">
              <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                <rect x="2.5" y="3.75" width="15" height="13.75" rx="1.5" stroke="#fff" strokeWidth="1.67"/>
                <path d="M6.67 2.5v2.5M13.33 2.5v2.5M2.5 8.33h15" stroke="#fff" strokeWidth="1.67" strokeLinecap="round"/>
              </svg>
              Schedule interview
            </button>
            <div className="stage-dropdown-wrapper">
              <button
                className="stage-dropdown-btn"
                onClick={() => setStageOpen(!stageOpen)}
              >
                <span className="stage-dropdown-label">{currentStage}</span>
                <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="#000" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
              {stageOpen && (
                <div className="stage-dropdown-list">
                  {STAGES.map(s => (
                    <button
                      key={s}
                      className={`stage-option ${s === currentStage ? 'active' : ''}`}
                      onClick={() => { setCurrentStage(s); setStageOpen(false); }}
                    >
                      {s}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ── App (Desktop: side-by-side, Mobile: single screen) ── */

    function App() {
      const [selectedCandidate, setSelectedCandidate] = useState(null);
      const [demoCandidate] = useState(UNREAD_MESSAGES[0]);
      const isMobile = window.innerWidth < 640;

      if (isMobile) {
        return (
          <div className="desktop-layout">
            <div className="phone-frame">
              {selectedCandidate ? (
                <CandidateDetail
                  candidate={selectedCandidate}
                  onBack={() => setSelectedCandidate(null)}
                />
              ) : (
                <InboxScreen onSelectCandidate={setSelectedCandidate} />
              )}
            </div>
          </div>
        );
      }

      return (
        <div className="desktop-layout">
          <div>
            <div className="phone-frame-label">Mobile Inbox</div>
            <div className="phone-frame">
              <InboxScreen onSelectCandidate={setSelectedCandidate} />
            </div>
          </div>
          <div>
            <div className="phone-frame-label">Candidate Detail — {selectedCandidate ? selectedCandidate.name : demoCandidate.name}</div>
            <div className="phone-frame">
              <CandidateDetail
                candidate={selectedCandidate || demoCandidate}
                onBack={() => setSelectedCandidate(null)}
              />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
